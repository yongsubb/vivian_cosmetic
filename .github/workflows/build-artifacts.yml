name: Build downloadable artifacts

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ vars.API_BASE_URL || 'https://vivian-cosmetic-backend.onrender.com' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --dart-define=API_BASE_URL=$API_BASE_URL

      - name: Zip web build
        run: |
          cd build/web
          zip -r ../../web-build.zip .

      - name: Build Android APK (debug)
        run: flutter build apk --debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vivian_pos_artifacts
          path: |
            web-build.zip
            build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
